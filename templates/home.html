<html>
	<head>
		<title> KC Chatbot </title>
		<style>
	    * {
	        box-sizing: border-box;
	        font-family: 'Segoe UI', Cambria, sans-serif;
	    }

	    body {
    	    margin: 0;
        	padding: 0;
        	background: linear-gradient(135deg, #1f1f1f, #2c3e50);
     		display: flex;
        	flex-direction: column;
        	align-items: center;
        	justify-content: center;
     		height: 100vh;
        	color: #ffffff;
    	}

    	h1 {
    	    margin-bottom: 20px;
    	    font-size: 40px;
    	    letter-spacing: 2px;
    	}

    	form {
    	    background: #ffffff;
    	    padding: 25px;
    	    border-radius: 15px;
    	    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    	    width: 600px;
    	    max-width: 90%;
    	}

    	textarea {
        	width: 100%;
        	height: 180px;
        	padding: 15px;
        	border-radius: 10px;
        	border: none;
        	resize: none;
        	font-size: 18px;
        	outline: none;

        	/* Dark background with white text */
        	background-color: #111111;
        	color: #ffffff;
    	}

    	input[type="text"] {
        	width: 70%;
        	padding: 10px;
        	border-radius: 8px;
        	border: 1px solid #ccc;
        	font-size: 18px;
        	margin-top: 15px;
    	}

    	input[type="submit"] {
        	padding: 10px 20px;
        	border-radius: 8px;
        	border: none;
        	background-color: #2c3e50;
        	color: #ffffff;
        	font-size: 18px;
        	cursor: pointer;
        	transition: 0.3s ease;
    	}

    	input[type="submit"]:hover {
        	background-color: #1abc9c;
    	}

    	h2 {
        	margin-top: 20px;
        	font-size: 22px;
        	color: #ffffff;
    	}

    	/* OPTIONAL LIGHT MODE (if you switch background to white) */
    	.light textarea {
        	background-color: #ffffff;
        	color: #000000;
        	border: 1px solid #ccc;
    	}
	</style>
		<script>
			function sb()
			{
				let chatbox = document.getElementById("chatbox");
				chatbox.scrollTop = chatbox.scrollHeight;
			}
		</script>
	</head>	

	<body onload = "sb()">
		<h1> KC ChatBot </h1>
		<form method = "POST">
			<textarea	 rows=7 cols= 70 name = "chat" id = "chatbox">{{chat}}</textarea>
			<br><br>
			<input type = "text"    name = "qts"    placeholder = "Enter Question: "/>
			<input type = "submit" />
		</form>
		<h2> {{ msg }} </h2>
	</body>
</html>
